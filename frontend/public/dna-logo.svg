<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c4a6e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="rgba(15, 23, 42, 0.5)" stroke="url(#primaryGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Left DNA strand with gradient -->
  <g filter="url(#glow)">
    <path d="M 55 30 Q 40 50, 55 75 Q 70 95, 55 120 Q 40 145, 55 170" 
          stroke="url(#primaryGrad)" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Right DNA strand with accent gradient -->
  <g filter="url(#glow)">
    <path d="M 145 30 Q 160 50, 145 75 Q 130 95, 145 120 Q 160 145, 145 170" 
          stroke="url(#accentGrad)" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Connecting elements (rungs) -->
  <g opacity="0.9">
    <circle cx="55" cy="50" r="5" fill="url(#primaryGrad)"/>
    <circle cx="145" cy="50" r="5" fill="url(#accentGrad)"/>
    <line x1="55" y1="50" x2="145" y2="50" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <g opacity="0.85">
    <circle cx="55" cy="95" r="6" fill="url(#primaryGrad)"/>
    <circle cx="145" cy="95" r="6" fill="url(#accentGrad)"/>
    <line x1="55" y1="95" x2="145" y2="95" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <g opacity="0.8">
    <circle cx="55" cy="140" r="5" fill="url(#primaryGrad)"/>
    <circle cx="145" cy="140" r="5" fill="url(#accentGrad)"/>
    <line x1="55" y1="140" x2="145" y2="140" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Central security shield/lock element -->
  <g transform="translate(100, 100)">
    <!-- Shield shape -->
    <path d="M -15 -20 L -15 -5 Q -15 8, 0 12 Q 15 8, 15 -5 L 15 -20 Z" 
          fill="url(#primaryGrad)" opacity="0.15" stroke="url(#primaryGrad)" stroke-width="1.5"/>
    
    <!-- Lock icon -->
    <g>
      <!-- Shackle -->
      <path d="M -8 -8 Q -8 -14, 0 -16 Q 8 -14, 8 -8" 
            fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
      
      <!-- Lock body -->
      <rect x="-10" y="-2" width="20" height="12" rx="2" fill="none" 
            stroke="url(#accentGrad)" stroke-width="2.5"/>
      
      <!-- Keyhole -->
      <circle cx="0" cy="3" r="1.5" fill="url(#primaryGrad)"/>
    </g>
  </g>
  
  <!-- Accent dots for visual interest -->
  <circle cx="100" cy="35" r="3" fill="url(#primaryGrad)" opacity="0.6"/>
  <circle cx="100" cy="165" r="3" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
