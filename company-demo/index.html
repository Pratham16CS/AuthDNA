<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme Corp — Secure Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #6366f1;
      --brand-dark: #4f46e5;
      --bg: #0f0f14;
      --card: #17171f;
      --border: #2a2a38;
      --text: #e8e8f0;
      --muted: #8888a8;
      --allow: #10b981;
      --otp: #f59e0b;
      --stepup: #f97316;
      --block: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(23,23,31,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 10;
    }
    nav .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.2rem; font-weight: 700; letter-spacing: -.02em;
    }
    nav .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--brand), #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    nav .badge { margin-left: auto; font-size: .75rem; color: var(--muted); }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .login-wrap { width: 100%; max-width: 420px; }

    .login-header { text-align: center; margin-bottom: 28px; }
    .login-header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .login-header p { color: var(--muted); font-size: .9rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: 6px; color: var(--muted); }
    input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: #0f0f14;
      color: var(--text); font-size: .95rem; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--brand); }

    .hint { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .1s; margin-top: 6px;
    }
    .btn:hover:not(:disabled) { opacity: .9; }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULT CARD */
    .result {
      margin-top: 24px; border-radius: 12px; padding: 20px;
      border: 1px solid var(--border); display: none;
    }
    .result.visible { display: block; animation: fadeUp .3s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .result-score { font-size: 2.5rem; font-weight: 800; line-height: 1; }
    .decision-badge {
      padding: 5px 12px; border-radius: 999px;
      font-size: .85rem; font-weight: 700; letter-spacing: .04em;
    }
    .dec-ALLOW  { background: rgba(16,185,129,.15); color: var(--allow); border: 1px solid rgba(16,185,129,.3); }
    .dec-OTP    { background: rgba(245,158,11,.15); color: var(--otp);  border: 1px solid rgba(245,158,11,.3); }
    .dec-STEPUP { background: rgba(249,115,22,.15); color: var(--stepup); border: 1px solid rgba(249,115,22,.3); }
    .dec-BLOCK  { background: rgba(239,68,68,.15);  color: var(--block);  border: 1px solid rgba(239,68,68,.3); }

    .result-msg {
      font-size: .9rem; padding: 12px; border-radius: 8px;
      margin-bottom: 12px; font-style: italic; color: var(--muted);
      background: rgba(255,255,255,.04);
    }

    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .meta-item { background: rgba(255,255,255,.04); border-radius: 8px; padding: 10px; }
    .meta-item .label { font-size: .72rem; color: var(--muted); margin-bottom: 3px; }
    .meta-item .value { font-size: .95rem; font-weight: 600; }

    /* LOGIN HISTORY */
    .history { margin-top: 32px; }
    .history h3 { font-size: .9rem; color: var(--muted); margin-bottom: 10px; font-weight: 500; }
    .history-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; font-size: .84rem;
    }
    .history-item .user { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .time { color: var(--muted); font-size: .75rem; white-space: nowrap; }

    .powered {
      text-align: center; margin-top: 20px; font-size: .75rem; color: var(--muted);
    }
    .powered a { color: var(--brand); text-decoration: none; }
    .powered a:hover { text-decoration: underline; }

    .error-box {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5; border-radius: 8px; padding: 10px 14px;
      font-size: .85rem; margin-bottom: 16px; display: none;
    }
    .error-box.visible { display: block; }

    /* DEMO USERS */
    .demo-users {
      margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px;
    }
    .demo-user-btn {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: .78rem; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .demo-user-btn:hover { border-color: var(--brand); color: var(--text); }
  </style>
</head>
<body>
  <nav>
    <div class="logo">
      <div class="logo-icon">🏢</div>
      Acme Corp
    </div>
    <span class="badge">Secured by <strong>AuthDNA</strong> 🛡️</span>
  </nav>

  <main>
    <div class="login-wrap">
      <div class="login-header">
        <h1>Welcome back</h1>
        <p>Sign in to your Acme account</p>
      </div>

      <div class="card">
        <div id="error-box" class="error-box"></div>

        <form id="loginForm">
          <div class="field">
            <label for="username">Email / Username</label>
            <input type="text" id="username" placeholder="alice@acme.com" autocomplete="username" required />
            <p class="hint">Try different users to build behavioral DNA</p>
            <div class="demo-users">
              <button type="button" class="demo-user-btn" onclick="setUser('alice@acme.com')">alice</button>
              <button type="button" class="demo-user-btn" onclick="setUser('bob@acme.com')">bob</button>
              <button type="button" class="demo-user-btn" onclick="setUser('charlie@acme.com')">charlie</button>
              <button type="button" class="demo-user-btn" onclick="setUser('eve@evil.com')">eve (risky)</button>
              <button type="button" class="demo-user-btn" onclick="setUser('admin@acme.com')">admin</button>
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>

          <button type="submit" class="btn" id="submitBtn">
            <span id="btnText">Sign In</span>
          </button>
        </form>

        <div id="result" class="result">
          <div class="result-header" style="justify-content: center;">
            <span class="decision-badge" id="decisionBadge" style="font-size: 1.2rem; padding: 8px 20px">—</span>
          </div>
          <div style="text-align: center; margin-top: 10px; color: var(--muted); font-size: 0.9rem;" id="loginStatus">—</div>
          <div style="text-align: center; margin-top: 8px; color: var(--muted); font-size: 0.8rem;" id="loginLocation"></div>
        </div>
      </div>

      <!-- History -->
      <div class="history">
        <h3>Recent logins this session</h3>
        <ul class="history-list" id="historyList">
          <li style="color:var(--muted);font-size:.84rem;padding:6px 0">No logins yet — try signing in above.</li>
        </ul>
      </div>

      <p class="powered">Protected by <a href="http://localhost:8080" target="_blank">AuthDNA</a> — AI-powered login risk scoring</p>
    </div>
  </main>

  <script>
    // Collect device fingerprint
    function getContext() {
      const n = navigator, s = screen;
      return {
        user_agent: n.userAgent,
        screen_resolution: s.width + 'x' + s.height,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        language: n.language,
        platform: n.platform,
        color_depth: s.colorDepth,
        cookie_enabled: n.cookieEnabled,
        hardware_concurrency: n.hardwareConcurrency || 0,
        device_memory: n.deviceMemory || 0,
        touch_support: 'ontouchstart' in window || n.maxTouchPoints > 0,
        canvas_hash: canvasHash(),
        webgl_renderer: webglRenderer(),
      };
    }

    function canvasHash() {
      try {
        const c = document.createElement('canvas'); c.width=200; c.height=50;
        const x = c.getContext('2d');
        x.textBaseline='top'; x.font='14px Arial';
        x.fillStyle='#f60'; x.fillRect(125,1,62,20);
        x.fillStyle='#069'; x.fillText('AuthDNA',2,15);
        const d = c.toDataURL(); let h = 0;
        for(let i=0;i<d.length;i++){h=((h<<5)-h)+d.charCodeAt(i);h=h&h;}
        return Math.abs(h).toString(16);
      } catch(e) { return ''; }
    }

    function webglRenderer() {
      try {
        const c = document.createElement('canvas');
        const g = c.getContext('webgl')||c.getContext('experimental-webgl');
        if(!g) return '';
        const d = g.getExtension('WEBGL_debug_renderer_info');
        return d ? g.getParameter(d.UNMASKED_RENDERER_WEBGL)||'' : '';
      } catch(e) { return ''; }
    }

    function setUser(email) {
      document.getElementById('username').value = email;
      document.getElementById('password').focus();
    }

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const errorBox = document.getElementById('error-box');
    const resultEl = document.getElementById('result');
    const historyList = document.getElementById('historyList');

    const DECISION_COLORS = {
      ALLOW:  { bg: 'rgba(16,185,129,.08)',  border: 'rgba(16,185,129,.3)' },
      OTP:    { bg: 'rgba(245,158,11,.08)',   border: 'rgba(245,158,11,.3)' },
      STEPUP: { bg: 'rgba(249,115,22,.08)',   border: 'rgba(249,115,22,.3)' },
      BLOCK:  { bg: 'rgba(239,68,68,.08)',    border: 'rgba(239,68,68,.3)' },
    };

    const SCORE_COLOR = s => s < 30 ? '#10b981' : s < 60 ? '#f59e0b' : s < 80 ? '#f97316' : '#ef4444';

    let loginHistory = [];

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      setLoading(true);
      errorBox.classList.remove('visible');
      resultEl.classList.remove('visible');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, deviceContext: getContext() }),
        });
        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'Login evaluation failed');
          return;
        }

        showResult(username, data);
        addHistory(username, data);
      } catch (err) {
        showError('Network error: ' + err.message);
      } finally {
        setLoading(false);
      }
    });

    function setLoading(on) {
      submitBtn.disabled = on;
      btnText.innerHTML = on
        ? '<span class="spinner"></span> Evaluating...'
        : 'Sign In';
    }

    function showError(msg) {
      errorBox.textContent = '⚠️ ' + msg;
      errorBox.classList.add('visible');
    }

    function showResult(username, data) {
      const { decision, success, city, country, ip } = data;
      const colors = DECISION_COLORS[decision] || {};

      resultEl.style.background = colors.bg || 'rgba(255,255,255,.04)';
      resultEl.style.borderColor = colors.border || 'var(--border)';

      const badge = document.getElementById('decisionBadge');
      badge.textContent = decision;
      badge.className = 'decision-badge dec-' + decision;

      document.getElementById('loginStatus').textContent = success ? '✅ Logged In Successfully' : '🚫 Authentication Blocked';
      
      const locEl = document.getElementById('loginLocation');
      if (ip && ip !== 'Unknown' && ip !== '127.0.0.1') {
         locEl.textContent = `from ${city || 'Unknown City'}, ${country || 'Unknown Country'} (IP: ${ip})`;
         locEl.style.display = 'block';
      } else {
         locEl.textContent = 'from Local Network (127.0.0.1)';
         locEl.style.display = 'block';
      }

      resultEl.classList.add('visible');
    }

    function addHistory(username, data) {
      const { decision } = data;
      const colors = DECISION_COLORS[decision] || {};
      loginHistory.unshift({ username, decision, time: new Date() });
      if (loginHistory.length > 20) loginHistory.pop();

      const firstItem = historyList.querySelector('li[style]');
      if (firstItem) firstItem.remove();

      const li = document.createElement('li');
      li.className = 'history-item';
      li.style.borderLeftColor = colors.border || 'var(--border)';
      li.style.borderLeftWidth = '3px';
      li.innerHTML = `
        <span class="decision-badge dec-${decision}">${decision}</span>
        <span class="user">${username}</span>
        <span class="time">${new Date().toLocaleTimeString()}</span>
      `;
      historyList.prepend(li);
    }
  </script>
</body>
</html>
